<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citi Bike Dock Availability</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a2a3a 0%, #0d1f2d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .container {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            max-width: 700px;
            width: 93%;
        }
        .home-link {
            position: fixed; top: 20px; left: 20px;
            color: rgba(255,255,255,0.8); text-decoration: none;
            font-size: 1em; padding: 10px 20px;
            background: rgba(255,255,255,0.1); border-radius: 10px;
            transition: all 0.3s;
        }
        .home-link:hover { background: rgba(255,255,255,0.2); color: #fff; }
        h1 { font-size: 2.4em; margin-bottom: 8px; text-align: center; font-weight: 700; letter-spacing: 1px; }
        .logo-row { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 6px; }
        .citi-blue { color: #0073cf; }
        .subtitle { text-align: center; font-size: 1.05em; margin-bottom: 30px; opacity: 0.8; font-weight: 300; }
        .search-box { position: relative; margin-bottom: 20px; }
        .search-box input {
            width: 100%; padding: 14px 18px; font-size: 1.05em;
            border: 2px solid rgba(0,115,207,0.3); border-radius: 10px;
            background: rgba(255,255,255,0.1); color: #fff; outline: none;
            transition: all 0.3s;
        }
        .search-box input::placeholder { color: rgba(255,255,255,0.5); }
        .search-box input:focus { background: rgba(255,255,255,0.18); border-color: #0073cf; }
        .stations-list {
            max-height: 440px; overflow-y: auto;
            background: rgba(0,0,0,0.25); border-radius: 10px;
        }
        .station-item {
            padding: 14px 18px; cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            transition: all 0.2s; display: flex; justify-content: space-between; align-items: center;
        }
        .station-item:hover { background: rgba(0,115,207,0.15); }
        .station-item:last-child { border-bottom: none; }
        .station-name { font-size: 1.05em; font-weight: 500; }
        .station-meta { display: flex; gap: 14px; align-items: center; }
        .bikes-badge, .docks-badge {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 3px 9px; border-radius: 12px; font-size: 0.82em; font-weight: 700;
        }
        .bikes-badge { background: #0073cf; color: #fff; }
        .docks-badge { background: #444; color: #ccc; }
        .ebike-icon { color: #ffcc00; }
        .station-arrow { font-size: 1.1em; opacity: 0.4; margin-left: 10px; }
        .station-item:hover .station-arrow { opacity: 1; }
        .no-results { text-align: center; padding: 30px; opacity: 0.6; }
        .loading-text { text-align: center; padding: 30px; color: #0073cf; }
        .stats-bar {
            display: flex; justify-content: center; gap: 24px; margin-bottom: 20px;
            font-size: 0.9em; color: #aaa;
        }
        .stats-bar span { font-weight: 600; color: #0073cf; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: rgba(0,115,207,0.3); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0,115,207,0.5); }
    </style>
</head>
<body>
    <a href="/" class="home-link">← Home</a>
    <div class="container">
        <div class="logo-row">
            <h1>🚲 <span class="citi-blue">Citi Bike</span></h1>
        </div>
        <div class="subtitle">Dock Availability</div>
        <div class="stats-bar" id="stats-bar"></div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search for a station..." autocomplete="off">
        </div>
        <div class="stations-list" id="stationsList">
            <div class="loading-text">Loading stations...</div>
        </div>
    </div>
    <script>
        let allStations = [];

        async function loadStations() {
            try {
                const resp = await fetch('/api/citibike/stations');
                allStations = await resp.json();

                // Show stats
                const totalBikes = allStations.reduce((s, st) => s + st.num_bikes_available, 0);
                const totalEbikes = allStations.reduce((s, st) => s + st.ebikes, 0);
                const totalDocks = allStations.reduce((s, st) => s + st.num_docks_available, 0);
                document.getElementById('stats-bar').innerHTML =
                    '<span>' + allStations.length + '</span> stations &nbsp;|&nbsp; ' +
                    '<span>' + totalBikes + '</span> bikes &nbsp;|&nbsp; ' +
                    '<span>' + totalEbikes + '</span> e-bikes &nbsp;|&nbsp; ' +
                    '<span>' + totalDocks + '</span> docks';

                displayStations(allStations);
            } catch (err) {
                document.getElementById('stationsList').innerHTML =
                    '<div class="no-results">Error loading stations. Please refresh.</div>';
            }
        }

        function displayStations(list) {
            const el = document.getElementById('stationsList');
            if (list.length === 0) {
                el.innerHTML = '<div class="no-results">No stations found</div>';
                return;
            }
            el.innerHTML = '';
            list.forEach(function(st) {
                const item = document.createElement('div');
                item.className = 'station-item';
                const bikesColor = st.num_bikes_available === 0 ? '#c0392b' : '#0073cf';
                const docksColor = st.num_docks_available === 0 ? '#c0392b' : '#444';
                item.innerHTML =
                    '<div class="station-name">' + st.name + '</div>' +
                    '<div class="station-meta">' +
                        '<span class="bikes-badge" style="background:' + bikesColor + '">🚲 ' + st.num_bikes_available +
                            (st.ebikes > 0 ? ' <span class="ebike-icon">⚡' + st.ebikes + '</span>' : '') +
                        '</span>' +
                        '<span class="docks-badge" style="background:' + docksColor + '">🅿 ' + st.num_docks_available + '</span>' +
                        '<span class="station-arrow">→</span>' +
                    '</div>';
                item.onclick = function() {
                    window.location.href = '/citibike/station/' + encodeURIComponent(st.station_id);
                };
                el.appendChild(item);
            });
        }

        document.getElementById('searchInput').addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase();
            if (!term) { displayStations(allStations); return; }
            displayStations(allStations.filter(function(st) {
                return st.name.toLowerCase().includes(term);
            }));
        });

        loadStations();
        // Refresh every 60s
        setInterval(loadStations, 60000);
    </script>
</body>
</html>
